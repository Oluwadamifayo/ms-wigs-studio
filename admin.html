<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Hub - Management Suite</title>
    <script>
        if (sessionStorage.getItem('admin_authenticated') !== 'true') {
            window.location.replace("/");
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f0f11; color: #e4e4e7; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1000px; margin: 0 auto; }
        h1, h2 { color: #ffffff; border-bottom: 1px solid #27272a; padding-bottom: 10px; }
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #18181b; padding: 20px; border-radius: 8px; border: 1px solid #27272a; }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; color: #a1a1aa; text-transform: uppercase; }
        .stat-card p { margin: 0; font-size: 28px; font-weight: bold; }
        .panel { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        input, select { background: #0f0f11; border: 1px solid #3f3f46; border-radius: 6px; padding: 10px; color: white; font-size: 14px; }
        button { background: #ffffff; color: #000000; border: none; padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #e4e4e7; }
        .product-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: left; }
        .product-table th, .product-table td { padding: 12px; border-bottom: 1px solid #27272a; }
        .product-table th { background: #27272a; font-size: 14px; }
        .danger-btn { background: #ef4444; color: white; padding: 6px 12px; font-size: 12px; border-radius: 4px; }
        .danger-btn:hover { background: #dc2626; }
        .logout-btn { background: #27272a; color: #fff; float: right; padding: 8px 15px; font-size: 14px; }
        .logout-btn:hover { background: #3f3f46; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #a1a1aa; text-decoration: none; }
        .back-link:hover { color: white; }
        .item-preview { width: 45px; height: 45px; object-fit: cover; border-radius: 4px; border: 1px solid #3f3f46; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <button class="logout-btn" onclick="logoutAdmin()">Secure Exit</button>
    <a href="/" class="back-link">&larr; Return to Storefront</a>
    <h1>Studio Store Inventory Suite</h1>
    
    <div class="stats-row">
        <div class="stat-card">
            <h3>Live Catalog Size</h3>
            <p id="totalCount">0 Items</p>
        </div>
        <div class="stat-card">
            <h3>Connected Collections</h3>
            <p>4 Active</p>
        </div>
    </div>

    <div class="panel">
        <h2>Inject New Item Into Live Grid</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="input-group">
                <label>Item Name Designation</label>
                <input type="text" id="prodName" placeholder="e.g., Premium Unit Choice">
            </div>
            <div class="input-group">
                <label>Target Collection Shelf</label>
                <select id="prodCategory">
                    <option value="STRAIGHT HAIR">STRAIGHT HAIR</option>
                    <option value="PISSIE CURLY">PISSIE CURLY</option>
                    <option value="BOUNCY HAIR">BOUNCY HAIR</option>
                    <option value="TIWA HAIR">TIWA HAIR</option>
                </select>
            </div>
        </div>
        <div class="input-group" style="margin-top: 10px;">
            <label>ImgBB Image Direct URL Link</label>
            <input type="text" id="prodImage" placeholder="https://i.ibb.co/...">
        </div>
        <button onclick="addNewProduct()" style="margin-top: 10px;">Deploy Item to Store</button>
    </div>

    <div class="panel">
        <h2>Active Live Inventory Manager</h2>
        <table class="product-table">
            <thead>
                <tr>
                    <th>Visual</th>
                    <th>Item ID Tag</th>
                    <th>Classification Line</th>
                    <th>Controls</th>
                </tr>
            </thead>
            <tbody id="inventoryTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    function renderInventory() {
        const data = JSON.parse(localStorage.getItem('wig_products')) || [];
        document.getElementById('totalCount').innerText = `${data.length} Units`;
        const tbody = document.getElementById('inventoryTableBody');
        tbody.innerHTML = '';
        
        data.forEach((item, idx) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><img src="${item.image}" class="item-preview" alt="Thumb"></td>
                <td><strong>${item.id}</strong></td>
                <td>${item.category}</td>
                <td><button class="danger-btn" onclick="purgeItem(${idx})">Delete Unit</button></td>
            `;
            tbody.appendChild(row);
        });
    }

    function addNewProduct() {
        const name = document.getElementById('prodName').value.trim();
        const category = document.getElementById('prodCategory').value;
        const image = document.getElementById('prodImage').value.trim();
        
        if(!image) {
            alert('A direct image source URL link is required.');
            return;
        }

        const currentStock = JSON.parse(localStorage.getItem('wig_products')) || [];
        const categoryItemsCount = currentStock.filter(item => item.category === category).length;
        const displaySequence = categoryItemsCount + 1;
        
        let formattedName = name;
        if (!formattedName) {
            if (category === "STRAIGHT HAIR") formattedName = `Straight Hair Unit ${displaySequence}`;
            else if (category === "PISSIE CURLY") formattedName = `Pissie Curly Unit ${displaySequence}`;
            else if (category === "BOUNCY HAIR") formattedName = `Bouncy Hair Unit ${displaySequence}`;
            else if (category === "TIWA HAIR") formattedName = `Tiwa Hair Unit ${displaySequence}`;
        }

        const uniqueId = `unit-${Date.now()}`;
        const newUnit = { id: uniqueId, name: formattedName, price: "", image: image, category: category };
        
        currentStock.push(newUnit);
        localStorage.setItem('wig_products', JSON.stringify(currentStock));
        
        document.getElementById('prodName').value = '';
        document.getElementById('prodImage').value = '';
        renderInventory();
        alert('Product added live successfully!');
    }

    window.purgeItem = function(index) {
        if(confirm("Are you sure you want to delete this hair unit? This updates the client storefront instantly.")) {
            const currentStock = JSON.parse(localStorage.getItem('wig_products')) || [];
            currentStock.splice(index, 1);
            localStorage.setItem('wig_products', JSON.stringify(currentStock));
            renderInventory();
        }
    }

    window.logoutAdmin = function() {
        sessionStorage.removeItem('admin_authenticated');
        // Points back to your root directory domain cleanly
        window.location.replace("/");
    }

    document.addEventListener('DOMContentLoaded', renderInventory);
</script>
</body>
</html>
