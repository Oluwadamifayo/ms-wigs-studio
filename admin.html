l<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Admin Manager</title>
    <style>
        body {
            background-color: #09090b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        h2 {
            border-bottom: 1px solid #27272a;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #a1a1aa;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: #18181b;
            border: 1px solid #27272a;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }
        .product-item {
            background: #18181b;
            padding: 15px;
            border: 1px solid #27272a;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .delete-btn {
            background: #ef4444;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Studio inventory Dashboard</h2>
        <p><a href="index.html" style="color: #a1a1aa; text-decoration: none;">&larr; Return to Website</a></p>
        
        <div style="background: #111113; padding: 20px; border-radius: 8px; border: 1px solid #27272a; margin-bottom: 30px;">
            <h3>Add New Product Listing</h3>
            
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="prodName" placeholder="e.g., Luxury Straight Unit">
            </div>

            <div class="form-group">
                <label>Price Description</label>
                <input type="text" id="prodPrice" placeholder="e.g., ₦50,000 or $120">
            </div>

            <div class="form-group">
                <label>Image Link URL</label>
                <input type="text" id="prodImage" placeholder="https://i.ibb.co/...">
            </div>

            <div class="form-group">
                <label>Inventory Collection Category</label>
                <select id="prodCategory">
                    <option value="STRAIGHT HAIR">STRAIGHT HAIR</option>
                    <option value="PISSIE CURLY">PISSIE CURLY</option>
                    <option value="BOUNCY HAIR">BOUNCY HAIR</option>
                    <option value="TIWA HAIR">TIWA HAIR</option>
                    <option value="OUR HAIR PRODUCTS">OUR HAIR PRODUCTS</option>
                </select>
            </div>

            <button id="saveProductBtn">Add to Store Inventory</button>
        </div>

        <h3>Current Inventory Products</h3>
        <div id="adminInventoryList"></div>
    </div>

    <script>
        if (sessionStorage.getItem('admin_authenticated') !== 'true') {
            alert('Access Denied');
            window.location.href = "index.html";
        }

        const saveProductBtn = document.getElementById('saveProductBtn');
        const adminInventoryList = document.getElementById('adminInventoryList');

        saveProductBtn.addEventListener('click', () => {
            const name = document.getElementById('prodName').value.trim();
            const price = document.getElementById('prodPrice').value.trim();
            const image = document.getElementById('prodImage').value.trim();
            const category = document.getElementById('prodCategory').value;

            if (!name || !image) {
                alert('Please enter a valid Name and Image URL.');
                return;
            }

            const products = JSON.parse(localStorage.getItem('wig_products')) || [];
            const newProduct = {
                id: 'custom-' + Date.now(),
                name: name,
                price: price || 'Contact for Price',
                image: image,
                category: category
            };

            products.push(newProduct);
            localStorage.setItem('wig_products', JSON.stringify(products));
            
            // Clear Inputs
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodImage').value = '';

            alert('Product added successfully!');
            renderAdminList();
        });

        function renderAdminList() {
            adminInventoryList.innerHTML = '';
            const products = JSON.parse(localStorage.getItem('wig_products')) || [];
            
            products.forEach((prod, index) => {
                const row = document.createElement('div');
                row.className = 'product-item';
                row.innerHTML = `
                    <div>
                        <strong>${prod.name}</strong> (${prod.price})<br>
                        <small style="color:#a1a1aa;">Category: ${prod.category}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteProduct(${index})">Delete</button>
                `;
                adminInventoryList.appendChild(row);
            });
        }

        window.deleteProduct = function(index) {
            if(confirm("Are you sure you want to remove this item?")) {
                const products = JSON.parse(localStorage.getItem('wig_products')) || [];
                products.splice(index, 1);
                localStorage.setItem('wig_products', JSON.stringify(products));
                renderAdminList();
            }
        };

        renderAdminList();
    </script>
</body>
</html>
