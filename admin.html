<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Admin Control Panel</title>
    <style>
        body { background: #09090b; color: #fff; font-family: sans-serif; padding: 20px; }
        .form-box { max-width: 400px; margin: 0 auto; background: #18181b; padding: 20px; border-radius: 8px; }
        input, select, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 4px; box-sizing: border-box; }
        input, select { background: #27272a; border: 1px solid #3f3f46; color: #fff; }
        button { background: #fff; color: #000; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-box">
        <h3>Add / Edit Catalog Product</h3>
        <input type="hidden" id="editingId">
        <input type="text" id="prodName" placeholder="Product Title / Name">
        <input type="text" id="prodPrice" placeholder="Price (e.g., 1500)">
        <input type="text" id="prodImage" placeholder="Paste HTML Embed Code or Direct Link">
        <select id="prodCategory">
            <option value="STRAIGHT HAIR">STRAIGHT HAIR</option>
            <option value="PISSIE CURLY">PISSIE CURLY</option>
            <option value="BOUNCY HAIR">BOUNCY HAIR</option>
            <option value="TIWA HAIR">TIWA HAIR</option>
            <option value="OUR HAIR PRODUCTS">OUR HAIR PRODUCTS</option>
        </select>
        <button id="saveBtn">Save Product Changes</button>
    </div>

    <script>
        function extractUrl(raw) {
            if(raw.includes('src=')) {
                let match = raw.match(/src="([^"]+)"/);
                return match ? match[1] : raw;
            }
            return raw;
        }

        document.getElementById('saveBtn').onclick = () => {
            const name = document.getElementById('prodName').value.trim();
            const price = document.getElementById('prodPrice').value.trim();
            const rawImg = document.getElementById('prodImage').value.trim();
            const category = document.getElementById('prodCategory').value;
            const editId = document.getElementById('editingId').value;

            if(!name || !rawImg) return alert('Name and Image fields are required!');

            const image = extractUrl(rawImg);
            let products = JSON.parse(localStorage.getItem('wig_products')) || [];

            if(editId) {
                products = products.map(p => p.id === editId ? { ...p, name, price, image, category } : p);
            } else {
                products.push({ id: 'item-' + Date.now(), name, price, image, category });
            }

            localStorage.setItem('wig_products', JSON.stringify(products));
            alert('Saved successfully locally!');
            location.reload();
        };
    </script>
</body>
</html>
