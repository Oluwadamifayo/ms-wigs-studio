<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Admin Control Panel</title>
    <style>
        body { background: #09090b; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 15px; box-sizing: border-box; }
        .form-box { max-width: 500px; margin: 0 auto; background: #18181b; padding: 20px; border-radius: 8px; border: 1px solid #27272a; box-sizing: border-box; }
        h3, h4 { text-align: center; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input, select { background: #27272a; border: 1px solid #3f3f46; color: #fff; }
        button { background: #ffffff; color: #000000; font-weight: bold; border: none; cursor: pointer; transition: background 0.2s; }
        button:active { background: #e4e4e7; }
        .list-container { margin-top: 25px; }
        .product-row { display: flex; align-items: center; justify-content: space-between; background: #27272a; padding: 12px; margin-bottom: 8px; border-radius: 6px; gap: 10px; }
        .prod-info { display: flex; flex-direction: column; flex-grow: 1; overflow: hidden; }
        .prod-title { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-meta { font-size: 13px; color: #a1a1aa; margin-top: 2px; }
        .action-btns { display: flex; gap: 6px; flex-shrink: 0; }
        .btn-edit { background: #2563eb; color: #fff; padding: 6px 12px; font-size: 13px; width: auto; margin: 0; border-radius: 4px; }
        .btn-delete { background: #dc2626; color: #fff; padding: 6px 12px; font-size: 13px; width: auto; margin: 0; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="form-box">
        <h3 id="formTitle">Add New Product</h3>
        <input type="hidden" id="editingId">
        <input type="text" id="prodName" placeholder="Product Name / Title (e.g. HAIR BRUSH)">
        <input type="text" id="prodPrice" placeholder="Price (e.g. ₦50,000 or Contact for Price)">
        <input type="text" id="prodImage" placeholder="Paste link or image HTML embed code">
        
        <select id="prodCategory">
            <option value="STRAIGHT HAIR">STRAIGHT HAIR</option>
            <option value="PISSIE CURLY">PISSIE CURLY</option>
            <option value="BOUNCY HAIR">BOUNCY HAIR</option>
            <option value="TIWA HAIR">TIWA HAIR</option>
            <option value="OUR HAIR PRODUCTS">OUR HAIR PRODUCTS</option>
        </select>
        
        <button id="saveBtn">Save Product Changes</button>
        <button id="cancelBtn" style="background:#3f3f46; color:#fff; display:none;">Cancel Editing</button>

        <div class="list-container">
            <h4>Live Online Catalog Inventory</h4>
            <div id="catalogList">Loading cloud database products...</div>
        </div>
    </div>

    <script>
        // OPEN PIPELINE GATEWAY FOR INSTANT MULTI-DEVICE GLOBAL SYNCHRONIZATION
        const cloudStorageUrl = 'https://kvdb.io/AnG9z7K7m8X9P2q4r7sW/ms_wigs_studio_live_db';
        let currentProducts = [];

        function extractUrl(raw) {
            if(raw.includes('src=')) {
                let match = raw.match(/src="([^"]+)"/);
                return match ? match[1] : raw;
            }
            return raw;
        }

        async function loadProducts() {
            try {
                const res = await fetch(cloudStorageUrl);
                if(res.ok) {
                    currentProducts = await res.json();
                } else {
                    currentProducts = JSON.parse(localStorage.getItem('wig_products')) || [];
                }
            } catch(e) {
                currentProducts = JSON.parse(localStorage.getItem('wig_products')) || [];
            }
            renderAdminList();
        }

        function renderAdminList() {
            const container = document.getElementById('catalogList');
            if(!currentProducts || currentProducts.length === 0) {
                container.innerHTML = `<p style="text-align:center; color:#a1a1aa;">No products found in cloud database.</p>`;
                return;
            }
            container.innerHTML = '';
            currentProducts.forEach(product => {
                const row = document.createElement('div');
                row.className = 'product-row';
                row.innerHTML = `
                    <div class="prod-info">
                        <div class="prod-title">${product.name}</div>
                        <div class="prod-meta">${product.category} — ${product.price}</div>
                    </div>
                    <div class="action-btns">
                        <button class="btn-edit" onclick="startEdit('${product.id}')">Edit</button>
                        <button class="btn-delete" onclick="deleteProduct('${product.id}')">Delete</button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        async function saveToCloud(arr) {
            try {
                await fetch(cloudStorageUrl, {
                    method: 'POST',
                    body: JSON.stringify(arr)
                });
            } catch(e) {
                console.error("Cloud syncing error: ", e);
            }
        }

        document.getElementById('saveBtn').onclick = async () => {
            const name = document.getElementById('prodName').value.trim();
            const price = document.getElementById('prodPrice').value.trim();
            const rawImg = document.getElementById('prodImage').value.trim();
            const category = document.getElementById('prodCategory').value;
            const editId = document.getElementById('editingId').value;

            if(!name || !rawImg) return alert('Product Name and Image source link are required!');

            const image = extractUrl(rawImg);

            if(editId) {
                currentProducts = currentProducts.map(p => p.id === editId ? { ...p, name, price, image, category } : p);
            } else {
                currentProducts.push({ id: 'item-' + Date.now(), name, price, image, category });
            }

            localStorage.setItem('wig_products', JSON.stringify(currentProducts));
            await saveToCloud(currentProducts);

            alert('Database synchronized globally across all client devices!');
            resetForm();
            loadProducts();
        };

        window.startEdit = function(id) {
            const target = currentProducts.find(p => p.id === id);
            if(!target) return;
            document.getElementById('editingId').value = target.id;
            document.getElementById('prodName').value = target.name;
            document.getElementById('prodPrice').value = target.price;
            document.getElementById('prodImage').value = target.image;
            document.getElementById('prodCategory').value = target.category;
            
            document.getElementById('formTitle').innerText = "Editing Product Mode";
            document.getElementById('cancelBtn').style.display = "block";
        };

        window.deleteProduct = async function(id) {
            if(!confirm("Are you sure you want to remove this product from the public storefront?")) return;
            currentProducts = currentProducts.filter(p => p.id !== id);
            
            localStorage.setItem('wig_products', JSON.stringify(currentProducts));
            await saveToCloud(currentProducts);
            
            loadProducts();
        };

        function resetForm() {
            document.getElementById('editingId').value = '';
            document.getElementById('prodName').value = '';
            document.getElementById('prodPrice').value = '';
            document.getElementById('prodImage').value = '';
            document.getElementById('formTitle').innerText = "Add New Product";
            document.getElementById('cancelBtn').style.display = "none";
        }

        document.getElementById('cancelBtn').onclick = resetForm;
        window.onload = loadProducts;
    </script>
</body>
</html>
