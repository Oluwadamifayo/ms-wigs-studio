<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MS Wigs Studio - Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f6f0; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #111; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #000; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #333; }
        .product-list { margin-top: 30px; }
        .product-item { display: flex; justify-content: space-between; align-items: center; background: #f0e6d2; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .delete-btn { background: #cc0000; color: white; width: auto; padding: 5px 10px; font-size: 12px; }
        .export-section { margin-top: 30px; background: #e2efff; padding: 15px; border-radius: 4px; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="login-container">
    <h1>Admin Login</h1>
    <div class="form-group">
        <label>Enter Secret Password</label>
        <input type="password" id="admin-pass" placeholder="Password">
    </div>
    <button onclick="checkPassword()">Login</button>
</div>

<div class="container" id="admin-dashboard" style="display: none;">
    <h1>MS Wigs Studio Dashboard</h1>
    <hr>
    <h2>Add New Product</h2>
    <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="p-name" placeholder="e.g., Classic Straight Unit">
    </div>
    <div class="form-group">
        <label>Price</label>
        <input type="text" id="p-price" placeholder="e.g., ₦80,000">
    </div>
    <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="p-image" placeholder="Paste ImgBB or dynamic asset image link">
    </div>
    <div class="form-group">
        <label>Category</label>
        <select id="p-category">
            <option value="STRAIGHT HAIR">STRAIGHT HAIR</option>
            <option value="PISSIE CURLY">PISSIE CURLY</option>
            <option value="BOUNCY HAIR">BOUNCY HAIR</option>
        </select>
    </div>
    <button onclick="addProduct()">Add Product</button>

    <div class="product-list">
        <h2>Current Products</h2>
        <div id="products-display"></div>
    </div>

    <div class="export-section">
        <h3>Save Your Changes Permanently</h3>
        <p>Click below to copy your database code array anytime you add something new, so you can give it to me to lock it down!</p>
        <button onclick="exportData()" style="background-color: #28a745;">Copy Data Code</button>
    </div>
</div>

<script>
    const SECRET_KEY = "mswigs2026"; 

    const defaultProducts = [
        { id: "straight-1", name: "Classic Straight Unit", price: "₦80,000", image: "https://i.ibb.co/Vv6XgY7/portfolio1.jpg", category: "STRAIGHT HAIR" },
        { id: "straight-2", name: "Premium Bone Straight", price: "₦120,000", image: "https://i.ibb.co/m0Y3pX5/portfolio2.jpg", category: "STRAIGHT HAIR" },
        { id: "bouncy-1", name: "Water Wave Wig", price: "₦85,000", image: "https://i.ibb.co/Vv6XgY7/portfolio1.jpg", category: "PISSIE CURLY" },
        { id: "bouncy-2", name: "CHINNY Human Blend", price: "₦55,000", image: "https://i.ibb.co/m0Y3pX5/portfolio2.jpg", category: "PISSIE CURLY" }
    ];

    if (!localStorage.getItem('wig_products')) {
        localStorage.setItem('wig_products', JSON.stringify(defaultProducts));
    }

    function checkPassword() {
        const pass = document.getElementById('admin-pass').value;
        if (pass === SECRET_KEY) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'block';
            renderProducts();
        } else {
            alert('Incorrect Password!');
        }
    }

    function renderProducts() {
        const products = JSON.parse(localStorage.getItem('wig_products'));
        const display = document.getElementById('products-display');
        display.innerHTML = '';
        products.forEach((p, index) => {
            display.innerHTML += `
                <div class="product-item">
                    <div>
                        <strong>${p.name}</strong> (${p.price}) <br>
                        <small style="color: #666;">Category: ${p.category}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteProduct(${index})">Delete</button>
                </div>
            `;
        });
    }

    function addProduct() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const image = document.getElementById('p-image').value;
        const category = document.getElementById('p-category').value;

        if(!name || !price) return alert("Please fill out Name and Price");

        const products = JSON.parse(localStorage.getItem('wig_products'));
        const id = "wig-" + Date.now();
        products.push({ id, name, price, image, category });
        localStorage.setItem('wig_products', JSON.stringify(products));
        
        renderProducts();
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
        document.getElementById('p-image').value = '';
    }

    function deleteProduct(index) {
        const products = JSON.parse(localStorage.getItem('wig_products'));
        products.splice(index, 1);
        localStorage.setItem('wig_products', JSON.stringify(products));
        renderProducts();
    }

    function exportData() {
        const products = localStorage.getItem('wig_products');
        navigator.clipboard.writeText(products);
        alert("Product data copied! You can send this text payload to your assistant anytime to apply updates.");
    }
</script>
</body>
</html>
